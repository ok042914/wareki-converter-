<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>西暦・和暦変換</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f9f4fb;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px 0;
      overflow: hidden; /* ← 追加 */
    }

    .container {
      text-align: center;
      padding: 40px 20px;
      width: min(100%, 520px);
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      color: #6f3b8b;
      margin-bottom: 40px;
      letter-spacing: 0.25em;
    }

    .drums {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }

    .drum-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .drum-label {
      font-size: 1.4rem;
      color: #705d81;
      letter-spacing: 0.18em;
      font-weight: 700;
    }

    .drum {
      width: 165px;
      height: 200px;
      overflow: hidden;
      position: relative;
      border-radius: 18px;
      background: #fff;
      border: 1px solid rgba(125, 69, 150, 0.14);
      box-shadow: 0 12px 32px rgba(109, 75, 128, 0.08);
      touch-action: none; /* ← 追加 */
    }

    .drum::before, .drum::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 60px;
      z-index: 2;
      pointer-events: none;
    }
    .drum::before {
      top: 0;
      background: linear-gradient(to bottom, #ffffff, transparent);
    }
    .drum::after {
      bottom: 0;
      background: linear-gradient(to top, #ffffff, transparent);
    }

    .drum-highlight {
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 52px;
      transform: translateY(-50%);
      border-top: 1px solid rgba(111, 59, 139, 0.18);
      border-bottom: 1px solid rgba(111, 59, 139, 0.18);
      background: transparent;
      z-index: 1;
      pointer-events: none;
    }

    .drum-inner {
      position: absolute;
      width: 100%;
      transition: transform 0.15s ease-out;
    }

    .drum-item {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #7b7b7b;
      transition: color 0.2s, font-size 0.2s, background 0.2s, transform 0.2s;
      user-select: none;
      padding: 0 10px;
      background: #f8f4fb;
    }

    .drum-item.active {
      color: #fff;
      font-size: 1.95rem;
      background: #111;
      border: 2px solid #111;
      border-radius: 14px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
      transform: scale(1.02);
      z-index: 2;
    }

    .drum-item.grayed {
      color: #b0a7b8;
      background: #f5f2f9;
    }

    #seireki-drum .drum-item.active {
      color: #fff;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1rem;
        margin-bottom: 30px;
      }

      .drums {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        width: 100%;
        max-width: 180px;
        margin: 0 auto;
      }

      .drum-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .drum {
        width: 126px;
        height: 170px;
      }

      .drum-item {
        height: 50px;
        font-size: 1.2rem;
      }

      .drum-item.active {
        font-size: 1.5rem;
      }

      .drum-highlight {
        height: 40px;
      }

      .container {
        padding: 20px 10px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>西暦 · 和暦</h1>
  <div class="drums">
    <div class="drum-wrapper">
      <div class="drum-label">西暦</div>
      <div class="drum" id="seireki-drum">
        <div class="drum-highlight"></div>
        <div class="drum-inner" id="seireki-inner"></div>
      </div>
    </div>
    <div class="drum-wrapper">
      <div class="drum-label">昭和</div>
      <div class="drum" id="showa-drum">
        <div class="drum-highlight"></div>
        <div class="drum-inner" id="showa-inner"></div>
      </div>
    </div>
    <div class="drum-wrapper">
      <div class="drum-label">平成</div>
      <div class="drum" id="heisei-drum">
        <div class="drum-highlight"></div>
        <div class="drum-inner" id="heisei-inner"></div>
      </div>
    </div>
    <div class="drum-wrapper">
      <div class="drum-label">令和</div>
      <div class="drum" id="reiwa-drum">
        <div class="drum-highlight"></div>
        <div class="drum-inner" id="reiwa-inner"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const ITEM_HEIGHT = 50;
  const VISIBLE = 5;
  const PADDING = Math.floor(VISIBLE / 2);

  const ERAS = {
    showa:  { start: 1926, end: 2100, offset: 1925, label: '昭和' },
    heisei: { start: 1989, end: 2100, offset: 1988, label: '平成' },
    reiwa:  { start: 2019, end: 2300, offset: 2018, label: '令和' },
  };

  const YEAR_MIN = 1926;
  const YEAR_MAX = 2300;

  let currentYear = new Date().getFullYear();

  const drums = {};

  function initDrum(id, items, getActiveIndex) {
    const inner = document.getElementById(id + '-inner');
    const drumEl = document.getElementById(id + '-drum');

    for (let i = 0; i < PADDING; i++) {
      const el = document.createElement('div');
      el.className = 'drum-item';
      inner.appendChild(el);
    }

    items.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'drum-item';
      el.textContent = item.text;
      el.dataset.index = i;
      inner.appendChild(el);
    });

    for (let i = 0; i < PADDING; i++) {
      const el = document.createElement('div');
      el.className = 'drum-item';
      inner.appendChild(el);
    }

    drums[id] = { inner, items, drumEl };

    let startY = 0;
    let startOffset = 0;
    let currentOffset = 0;
    let velocity = 0;
    let lastY = 0;
    let lastTime = 0;
    let animFrame = null;

    function getOffset(activeIdx) {
      return -(activeIdx * ITEM_HEIGHT + PADDING * ITEM_HEIGHT - ITEM_HEIGHT / 2);
    }

    function applyOffset(offset, animate) {
      inner.style.transition = animate ? 'transform 0.3s ease-out' : 'none';
      inner.style.transform = `translateY(${offset}px)`;
    }

    function snapToNearest(offset) {
      const idx = Math.round(-offset / ITEM_HEIGHT);
      const clamped = Math.max(0, Math.min(items.length - 1, idx));
      return clamped;
    }

    drumEl.addEventListener('touchstart', e => {
      cancelAnimationFrame(animFrame);
      startY = e.touches[0].clientY;
      lastY = startY;
      lastTime = Date.now();
      velocity = 0;
      const mat = new DOMMatrix(getComputedStyle(inner).transform);
      currentOffset = mat.m42;
      startOffset = currentOffset;
      inner.style.transition = 'none';
    }, { passive: true });

    drumEl.addEventListener('touchmove', e => {
      e.preventDefault(); // ← ページスクロールを止める
      const y = e.touches[0].clientY;
      const now = Date.now();
      const dt = now - lastTime;
      if (dt > 0) velocity = (y - lastY) / dt;
      lastY = y;
      lastTime = now;
      const diff = y - startY;
      currentOffset = startOffset + diff;
      applyOffset(currentOffset, false);
      updateActive(id, snapToNearest(currentOffset));
    }); // ← passive: true を削除

    drumEl.addEventListener('touchend', () => {
      let idx = snapToNearest(currentOffset);
      idx = Math.max(0, Math.min(items.length - 1, idx));
      currentOffset = getOffset(idx);
      applyOffset(currentOffset, true);
      updateActive(id, idx);
      if (id === 'seireki') {
        currentYear = items[idx].value;
      } else {
        const era = ERAS[id];
        currentYear = era.offset + items[idx].value;
      }
      updateAllEras();
    });

    let mouseDown = false;
    drumEl.addEventListener('mousedown', e => {
      mouseDown = true;
      startY = e.clientY;
      lastY = startY;
      lastTime = Date.now();
      velocity = 0;
      const mat = new DOMMatrix(getComputedStyle(inner).transform);
      currentOffset = mat.m42;
      startOffset = currentOffset;
      inner.style.transition = 'none';
    });
    window.addEventListener('mousemove', e => {
      if (!mouseDown) return;
      const y = e.clientY;
      const now = Date.now();
      const dt = now - lastTime;
      if (dt > 0) velocity = (y - lastY) / dt;
      lastY = y;
      lastTime = now;
      currentOffset = startOffset + (y - startY);
      applyOffset(currentOffset, false);
      updateActive(id, snapToNearest(currentOffset));
    });
    window.addEventListener('mouseup', () => {
      if (!mouseDown) return;
      mouseDown = false;
      let idx = snapToNearest(currentOffset);
      idx = Math.max(0, Math.min(items.length - 1, idx));
      currentOffset = getOffset(idx);
      applyOffset(currentOffset, true);
      updateActive(id, idx);
      if (id === 'seireki') {
        currentYear = items[idx].value;
      } else {
        const era = ERAS[id];
        currentYear = era.offset + items[idx].value;
      }
      updateAllEras();
    });

    const initIdx = getActiveIndex();
    currentOffset = getOffset(initIdx);
    applyOffset(currentOffset, false);
    updateActive(id, initIdx);
  }

  function updateActive(id, activeIdx) {
    const { inner, items } = drums[id];
    const allItems = inner.querySelectorAll('.drum-item[data-index]');
    allItems.forEach((el, i) => {
      el.classList.remove('active', 'grayed');
      if (i === activeIdx) {
        el.classList.add('active');
      } else if (items[i] && items[i].grayed) {
        el.classList.add('grayed');
      }
    });
  }

  function buildEraItems(eraKey, year) {
    const era = ERAS[eraKey];
    const items = [];
    for (let y = era.start; y <= era.end; y++) {
      items.push({
        value: y - era.offset,
        text: y - era.offset + '年',
        grayed: year < era.start || year > era.end,
      });
    }
    return items;
  }

  function updateAllEras() {
    const year = currentYear;

    const seireki = drums.seireki;
    const seirekiIdx = seireki.items.findIndex(it => it.value === year);
    if (seirekiIdx >= 0) {
      const offset = -(seirekiIdx * ITEM_HEIGHT);
      seireki.inner.style.transition = 'transform 0.3s ease-out';
      seireki.inner.style.transform = `translateY(${offset}px)`;
      updateActive('seireki', seirekiIdx);
    }

    ['showa', 'heisei', 'reiwa'].forEach(eraKey => {
      const era = ERAS[eraKey];
      const { inner, items } = drums[eraKey];
      const allItems = inner.querySelectorAll('.drum-item[data-index]');

      const inRange = year >= era.start && year <= era.end;
      allItems.forEach((el, i) => {
        el.classList.remove('active', 'grayed');
        if (!inRange) {
          el.classList.add('grayed');
        }
      });

      if (!inRange) return;

      const waYear = year - era.offset;
      const idx = items.findIndex(it => it.value === waYear);
      if (idx < 0) return;

      const offset = -(idx * ITEM_HEIGHT);
      inner.style.transition = 'transform 0.3s ease-out';
      inner.style.transform = `translateY(${offset}px)`;
      updateActive(eraKey, idx);
    });
  }

  const seirekiItems = [];
  for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
    seirekiItems.push({ value: y, text: y + '年' });
  }

  const showaItems = buildEraItems('showa', currentYear);
  const heiseiItems = buildEraItems('heisei', currentYear);
  const reiwaItems  = buildEraItems('reiwa',  currentYear);

  initDrum('seireki', seirekiItems, () => seirekiItems.findIndex(i => i.value === currentYear));
  initDrum('showa',  showaItems,  () => showaItems.findIndex(i => i.value === currentYear - ERAS.showa.offset));
  initDrum('heisei', heiseiItems, () => heiseiItems.findIndex(i => i.value === currentYear - ERAS.heisei.offset));
  initDrum('reiwa',  reiwaItems,  () => reiwaItems.findIndex(i => i.value === currentYear - ERAS.reiwa.offset));

  updateAllEras();
</script>
</body>
</html>
